name: Deploy static site to GitHub Pages

# Publishes the repository root (index.html + assets) to GitHub Pages.
# One-time setup: Settings -> Pages -> Build and deployment -> Source: "GitHub Actions".
on:
  push:
    branches:
      - main
      - claude/mobile-menu-layout-design-ufasoy
  workflow_dispatch:

# Permissions required by the Pages deploy action
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes supersede in-progress ones
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
